<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AC Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <link rel="stylesheet" href="./assets/custom.css" />
  </head>
  <body>
    <div id="app">
      <!-- Overlay -->
      <div id="overlay" class="overlay hidden"></div>

      <!-- Scoreboard -->
      <div id="scoreboard" class="scoreboard hidden">
        <!-- Header -->
        <div class="header">
          <div class="header-left">
            <img class="header-logo" src="./assets/logo.png" alt="Logo" />
            <h1 id="header-title" class="header-title">Scoreboard</h1>
          </div>
          <div class="header-right">
            <div class="player-count-badge">
              <span class="iconify" data-icon="mdi:account-group" data-width="18"></span>
              <span id="header-player-count">0/0</span>
            </div>
          </div>
        </div>

        <!-- Body -->
        <div class="body">
          <!-- Left Column: Groups + Indicators -->
          <div class="column-left">
            <!-- Groups Section -->
            <div id="groups-section" class="section">
              <div class="section-header">
                <span class="section-title" id="groups-title">Groups</span>
              </div>
              <div id="groups-grid" class="groups-grid"></div>
            </div>

            <!-- Status Indicators Section -->
            <div id="indicators-section" class="section">
              <div class="indicators-list" id="indicators-list"></div>
            </div>
          </div>

          <!-- Right Column: Players -->
          <div class="column-right">
            <div id="players-section" class="section section-fill">
              <div class="section-header">
                <span class="section-title" id="players-title">Players</span>
              </div>
              <div id="players-grid" class="players-grid"></div>
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div id="footer" class="footer">
          <div class="footer-left">
            <span id="footer-server-id-btn" class="server-id-btn" title="">
              <span class="iconify" data-icon="mdi:content-copy" data-width="14"></span>
              <span id="footer-server-id-text">ID: —</span>
            </span>
          </div>
          <div class="footer-right">
            <span class="footer-branding"></span>
          </div>
        </div>
      </div>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
